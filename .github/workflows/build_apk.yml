name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      # HAKBANG 1: Awtomatikong bubuo ng android/ folder at gradle setup
      - name: Re-generate Flutter Project Files
        run: flutter create . --platforms=android --org=com.renantefullo.navmaster

      # HAKBANG 2: Kukuha ng dependencies
      - name: Install Dependencies
        run: flutter pub get

      # HAKBANG 3: Mag-i-istraktura at mag-bi-build ng APK
      - name: Build APK (Release)
        run: flutter build apk --release

      # HAKBANG 4: I-a-upload ang na-generate na APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NavMaster-ETA-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Re-generate Flutter Project Files
        run: flutter create . --platforms=android --project-name eta --org com.renantefullo.navmaster

      # HAKBANG PARA SA ICON: Kina-copy ang icon.png mo papunta sa Android App Launcher Icon folders
      - name: Overwrite Default Android Launcher Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NavMaster-ETA-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk

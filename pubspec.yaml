name: eta
description: "A professional navigation ETA calculation tool for mariners."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# CONFIG FOR APP ICON
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - icon.png
